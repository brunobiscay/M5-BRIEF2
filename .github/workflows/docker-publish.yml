
name: CD - Docker Publish

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    # 1. Récupérer le code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Login Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Setup buildx (cache)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. Build + Push Backend Image
    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/m5-brief2-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/m5-brief2-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 5. (Optionnel mais recommandé) Frontend aussi
    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/m5-brief2-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/m5-brief2-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max